services:
  - type: web
    name: sigirl
    runtime: python
    buildCommand: pip install -r sigirl/sigirl/requirements.txt && cd sigirl && python manage.py collectstatic --noinput
    startCommand: cd sigirl && python manage.py migrate --noinput && gunicorn sigirl.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: FRONTEND_APP_URL
        value: "https://<tu-dominio>.onrender.com"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: ""
      - key: EMAIL_HOST_PASSWORD
        value: ""
      - key: DEFAULT_FROM_EMAIL
        value: ""
services:
  - type: web
    name: sigirl
    runtime: python
    buildCommand: pip3 install --upgrade pip && pip3 install -r requirements.txt && cd frontend && npm install && npm run build && cd .. && python3 -c "import shutil, os; shutil.rmtree('sigirl/staticfiles', ignore_errors=True); shutil.copytree('frontend/dist', 'sigirl/staticfiles')" && cd sigirl && python3 manage.py collectstatic --noinput --clear
    startCommand: cd sigirl && python3 manage.py migrate --noinput && python3 manage.py check --deploy && gunicorn sigirl.wsgi:application --bind 0.0.0.0:$PORT
    # ... variables de entorno ...